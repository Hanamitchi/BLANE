  <!-- =====================================================
       MAIN
  ====================================================== -->
  <main class="rp-main">
    <div class="rp-content">

      <!-- Page header -->
      <div class="rp-page-header">
        <div>
          <h1 class="rp-page-title">Recipes</h1>
          <p class="rp-page-sub">Filipino meals matched to your nutrition goals</p>
          <div id="rp-season-pill" style="margin-top:8px;"></div>
        </div>
        <div style="display:flex;align-items:center;gap:10px;">
          <span style="font-size:13px;color:#4d6e5a;"><span id="rp-result-count" style="color:#2ddc7a;font-weight:700;">12</span> recipes found</span>
        </div>
      </div>

      <!-- Search bar -->
      <div class="rp-toolbar">
        <div class="rp-search-wrap">
          <span class="rp-search-icon">🔍</span>
          <input
            type="text"
            class="rp-search-input"
            id="rp-search"
            placeholder="Search by name, ingredient, or meal type..."
          />
        </div>
      </div>

      <!-- Filter tabs -->
      <div class="rp-filter-row" id="rp-filter-row">
        <!-- Rendered by JS -->
      </div>

      <!-- Recipe grid -->
      <div class="rp-grid" id="rp-grid">
        <!-- Rendered by JS -->
      </div>

    </div>

       RECIPE DETAIL MODAL
  ====================================================== -->
  <div class="recipe-modal-overlay" id="recipe-modal-overlay">

      </div>
    </div>

  <script src="js/recipes.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var pill = document.getElementById('rp-season-pill');
      if (pill && typeof SEASONAL !== 'undefined') {
        pill.innerHTML = SEASONAL.currentSeasonPillHTML();
      }
    });
  </script>
